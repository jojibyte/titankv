name: Build and Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build native module
        run: npx cmake-js compile -- -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Run tests
        run: npm test

      - name: Copy prebuild
        shell: bash
        run: |
          mkdir -p prebuilds/${{ matrix.platform }}-${{ matrix.arch }}
          cp build/Release/titankv.node prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/node.napi.node

      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/

  # Test with multiple Node.js versions (using Linux prebuild)
  test-versions:
    needs: build
    strategy:
      matrix:
        node-version: [18, 20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download prebuild
        uses: actions/download-artifact@v4
        with:
          name: prebuild-linux-x64
          path: prebuilds/

      - name: Run tests
        run: npm test

  publish:
    needs: [build, test-versions]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: prebuilds/
          merge-multiple: true

      - name: Verify prebuilds
        run: |
          echo "=== Prebuild directory structure ==="
          find prebuilds/ -type f
          echo "=== Checking required platforms ==="
          test -f prebuilds/linux-x64/node.napi.node || (echo "MISSING: linux-x64" && exit 1)
          test -f prebuilds/darwin-x64/node.napi.node || (echo "MISSING: darwin-x64" && exit 1)
          test -f prebuilds/darwin-arm64/node.napi.node || (echo "MISSING: darwin-arm64" && exit 1)
          test -f prebuilds/win32-x64/node.napi.node || (echo "MISSING: win32-x64" && exit 1)
          echo "All prebuilds present!"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
